version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: instagram_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: instagram_clone

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: instagram_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/instagram_clone
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: instagram_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - ./frontend/.env
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
      - REACT_APP_SOCKET_URL=http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo_data:
